title: Eric Du
author: Eric Du
email: eric.du03@berkeley.edu

description:

url: "https://ericdu03.github.io"
baseurl: ""

remote_theme: abhinavs/moonwalk

markdown: kramdown

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme
  - jekyll-soopr-seo-tag
  - jekyll-markdown-output
  - jekyll-llms-output

theme_config:
  appearance: "auto"
  appearance_toggle: true

  show_description: true
  show_navbar: true
  show_footer: true
  show_copyright: true

  show_projects: true
  show_blog: false
  show_old_projects: true
  show_misc_list: false

  show_reading_time: false
  show_tags: false


  date_format: "%Y-%m-%d"

  home:
    title_old_projects: "Old Projects"
